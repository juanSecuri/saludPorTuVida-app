<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Salud Por Tu Vida</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        .navbar { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h2 { margin: 0; font-size: 20px; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Formulario para agregar */
        .form-add { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-add input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; }
        .btn-add { background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #0056b3; color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-predict { background-color: #ffc107; color: black; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>💊 Salud Por Tu Vida - Panel de Control</h2>
        <div>
            <span id="nombreUsuario" style="margin-right: 15px; font-weight: bold;"></span>
            <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
        </div>
    </div>

    <div class="container">
        <div class="header-panel">
            <h3>📦 Inventario de Medicamentos</h3>
        </div>

        <form class="form-add" id="formMedicamento" onsubmit="agregarMedicamento(event)">
            <input type="text" id="medNombre" placeholder="Nombre" required>
            <input type="text" id="medCategoria" placeholder="Categoría" required>
            <input type="number" id="medStock" placeholder="Stock Actual" required>
            <input type="number" step="0.01" id="medPrecio" placeholder="Precio ($)" required>
            <input type="number" id="medVentas" placeholder="Ventas (Mes)" required>
            <button type="submit" class="btn-add">+ Agregar</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Ventas Mes</th>
                    <th>Acción IA</th>
                </tr>
            </thead>
            <tbody id="tablaMedicamentos">
                </tbody>
        </table>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api";

        // Al cargar la página
        window.onload = () => {
            // Mostrar el nombre del usuario logueado
            const usuario = localStorage.getItem("usuarioLogueado") || "Usuario";
            document.getElementById("nombreUsuario").innerText = "Hola, " + usuario;
            cargarInventario();
        };

        // Función para obtener los medicamentos de la base de datos
        async function cargarInventario() {
            try {
                const respuesta = await fetch(`${API_URL}/panel/medicamentos`);
                const medicamentos = await respuesta.json();
                
                const tbody = document.getElementById("tablaMedicamentos");
                tbody.innerHTML = ""; // Limpiar tabla
                
                medicamentos.forEach(med => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${med.id}</td>
                            <td><strong>${med.nombre}</strong></td>
                            <td>${med.categoria}</td>
                            <td>${med.stockActual}</td>
                            <td>$${med.precio}</td>
                            <td>${med.ventasUltimoMes}</td>
                            <td><button class="btn-predict" onclick="verPrediccion(${med.id})">🔮 Predecir Stock</button></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar inventario", error);
            }
        }

        // Función para agregar un nuevo medicamento
        async function agregarMedicamento(event) {
            event.preventDefault(); // Evita que la página se recargue

            const nuevoMed = {
                nombre: document.getElementById("medNombre").value,
                categoria: document.getElementById("medCategoria").value,
                stockActual: parseInt(document.getElementById("medStock").value),
                precio: parseFloat(document.getElementById("medPrecio").value),
                ventasUltimoMes: parseInt(document.getElementById("medVentas").value)
            };

            try {
                const respuesta = await fetch(`${API_URL}/panel/agregar-medicamento`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoMed)
                });

                if (respuesta.ok) {
                    document.getElementById("formMedicamento").reset(); // Limpiar inputs
                    cargarInventario(); // Recargar la tabla
                } else {
                    alert("Error al guardar el medicamento.");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // Función para el módulo predictivo
        async function verPrediccion(id) {
            try {
                const respuesta = await fetch(`${API_URL}/prediccion/${id}`);
                const mensaje = await respuesta.text();
                alert("🤖 Análisis de IA:\n" + mensaje);
            } catch (error) {
                console.error("Error al predecir", error);
            }
        }

        function cerrarSesion() {
            localStorage.removeItem("usuarioLogueado");
            window.location.href = "index.html"; // Regresar al login
        }
    </script>
</body>
</html>
